{% assign example = include.example %}
<article>
  <a class="docs-chart-gallery__image" href="{{ example.url | relative_url }}" aria-label="Open {{ example.title }} documentation">
    <img
      src="{{ example.thumbnail | relative_url }}"
      alt="{{ example.alt }}"
      width="{{ example.thumbnail_width }}"
      height="{{ example.thumbnail_height }}"
      loading="{% if include.eager %}eager{% else %}lazy{% endif %}"
      {% if include.eager %}fetchpriority="high"{% endif %}
    >
  </a>
  <a class="docs-chart-gallery__title" href="{{ example.url | relative_url }}">{{ example.title }}</a>
  <p>{{ example.summary }}</p>
  <span class="docs-chart-gallery__actions"><code>{{ example.actions }}</code></span>
  <a class="docs-chart-gallery__full-size" href="{{ example.image | relative_url }}">View full size</a>
</article>
