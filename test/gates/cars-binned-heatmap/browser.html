<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cars binned heatmap review</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f1f5f9;
        font: 16px/1.5 system-ui, sans-serif;
      }
      main {
        padding: 20px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 12px 36px rgb(15 23 42 / 12%);
      }
      #status { margin: 0 0 12px; color: #64748b; }
      canvas { display: block; width: 700px; height: 500px; }
    </style>
  </head>
  <body>
    <main>
      <p id="status">Loading Cars bins…</p>
      <canvas id="chart" aria-label="Fuel economy by vehicle weight binned heatmap"></canvas>
    </main>
    <script type="module" src="./browser.main.js"></script>
  </body>
</html>
